name: CI for PR

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.java'
      - '**.gradle'
      - '**.kts'
      - 'gradle/**'
      - '.github/workflows/**'
      - '!**.md'
      - '!LICENSE'
      - '!.gitignore'
      - '!.gitattributes'
  workflow_dispatch:

jobs:
  gradlewTest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test with Gradle
        run: ./gradlew test
